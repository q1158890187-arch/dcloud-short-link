#redis配置
  redis:
    client-type: jedis
    host: 8.140.57.100
    password: 123456
    port: 6379
    jedis:
      pool:
        # 连接池最大连接数（使用负值表示没有限制）
        max-active: 100
        # 连接池中的最大空闲连接
